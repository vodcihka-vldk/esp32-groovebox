; ============================================================
;  ESP32 Groovebox — PlatformIO конфігурація
;  Платформа: ESP32 DevKit V1 (з PSRAM)
; ============================================================

[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

; ── Моніторинг ──────────────────────────────────────────────
monitor_speed   = 115200
monitor_filters = esp32_exception_decoder
upload_speed    = 921600

; ── Залежності ──────────────────────────────────────────────
lib_deps =
    ; Дисплей (LCD 1602 через I2C)
    johnrickman/LiquidCrystal_I2C@^1.1.4
    ; SD-карта та файлова система
    adafruit/SD@^1.2.4
    ; JSON для проектів
    arduino-libraries/ArduinoJson@^7.1.0
    ; I2C допоміжна бібліотека
    adafruit/Adafruit BusIO@^1.14.4

; ── Прапори збірки ──────────────────────────────────────────
build_flags =
    ; Рівень debug-логування (0=NONE, 1=ERROR, 2=WARN, 3=INFO, 4=DEBUG, 5=VERBOSE)
    -DCORE_DEBUG_LEVEL=2
    ; Кольорові UART-логи
    -DCONFIG_ARDUHAL_LOG_COLORS
    ; PSRAM активований на платі
    -DBOARD_HAS_PSRAM
    ; Виправлення cache-проблеми PSRAM ESP32
    -mfix-esp32-psram-cache-issue
    ; Шляхи include для нашої структури файлів
    -I src
    -I src/audio
    -I src/sequencer
    -I src/ui
    -I src/storage
    -I src/state
    -I src/config
    ; Оптимізація швидкодії
    -O2

; ── Налаштування збірки ─────────────────────────────────────
build_src_filter =
    +<*.cpp>
    +<audio/*.cpp>
    +<sequencer/*.cpp>
    +<ui/*.cpp>
    +<storage/*.cpp>
